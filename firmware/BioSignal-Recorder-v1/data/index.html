Patch notes (why this version differs from upstream):
- CSV is now streamed to disk as samples arrive (File System Access API),
  instead of being accumulated in one giant in-memory string. The old
  approach grew unbounded and made the tab progressively slower until it
  stopped draining the WebSocket, which in turn made the ESP32's blocking
  sendBIN() calls stall -> looked like "the server hangs after a minute."
- Chart rendering is decoupled from the data-receive path. Incoming samples
  are written to the CSV writer immediately and cheaply; the chart redraws
  on its own slow timer from a small ring buffer, so a slow/busy tab never
  blocks data intake.
- Falls back to periodic chunked downloads (instead of one huge blob) in
  browsers without the File System Access API (e.g. Firefox), so memory
  still can't grow unbounded during a long recording.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Bio-Signal Recorder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"
        integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.8.2/chart.min.js"></script>

    <style>
        @media (min-width: 991.98px) {
            .child {
                max-width: 95%;
                max-height: 500px;
            }
        }

        .child {
            max-height: 500px;
        }

        #status_bar {
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>

<body class="bg-secondary">
    <div class="container-fluid">

        <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
            <div class="container-fluid">

                <a class="navbar-brand text-white btn btn-outline-light bg-dark" href="#">Bio-Signal Recorder</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo01">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarTogglerDemo01">

                    <!-- Choose where to save BEFORE starting, so writes are streamed live -->
                    <button type="button" class="btn btn-outline-info btn-md w-auto m-1" id="choose_file_btn"
                        onclick="choose_save_file()">
                        Choose Save File
                    </button>

                    <!-- Fallback-mode manual flush / final save -->
                    <button type="button" class="btn btn-outline-light btn-md w-auto m-1" onclick="save_csv_fallback()">
                        Download CSV (fallback)
                    </button>

                    <div class="btn btn-outline-light bg-dark w-auto m-1">
                        <label class="text-light">No. of Channels</label>
                        <select class="bg-dark text-light" id="channel_count" onchange="create_chart()">
                            <option selected value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>

                    <div class="btn-group btn-group-toggle m-1 w-auto" data-toggle="buttons">
                        <label class="btn btn-primary active">
                            <input type="radio" name="options" id="option1" autocomplete="off" />
                            Start
                        </label>
                        <label class="btn btn-secondary">
                            <input type="radio" name="options" id="option2" autocomplete="off" checked />
                            Stop
                        </label>
                    </div>
                </div>
            </div>
        </nav>

        <div class="text-white p-1" id="status_bar">
            Save target: <span id="save_target_label">none selected (fallback download mode)</span> |
            Samples written: <span id="sample_count_label">0</span> |
            Buffered (unflushed) rows: <span id="buffer_count_label">0</span>
        </div>
    </div>

    <div class="container">
        <div class="row  text-center">
            <div class="parent bg-dark m-1 p-1 rounded-2 d-none col " id="d0">
                <canvas class="child d-none " id="c0"></canvas>
            </div>
            <div class="parent bg-dark m-1 p-1 rounded-2 d-none col " id="d1">
                <canvas class="child d-none " id="c1"></canvas>
            </div>
        </div>
        <div class="row text-center">
            <div class="parent bg-dark m-1 p-1 rounded-2 d-none col " id="d2">
                <canvas class="child d-none " id="c2"></canvas>
            </div>
            <div class="parent bg-dark m-1 p-1 rounded-2 d-none col " id="d3">
                <canvas class="child d-none " id="c3"></canvas>
            </div>
        </div>
    </div>

    <script>

        const startButton = document.getElementById("option1");
        const stopButton = document.getElementById("option2");

        startButton.addEventListener("click", startOscilloscope);
        stopButton.addEventListener("click", stopOscilloscope);

        /*********************************************************************************************************************************/
        /************************************ Visual configuration for data shown on chart ***********************************************/
        var dataBSR = [];
        dataBSR[0] = { labels: [0], datasets: [{ label: 'Channel_1', data: [], borderColor: '#00CCFF', backgroundColor: '#00CCFF', borderWidth: 2, pointRadius: 0 }] };
        dataBSR[1] = { labels: [0], datasets: [{ label: 'Channel_2', data: [], borderColor: '#4f0da1', backgroundColor: '#4f0da1', borderWidth: 2, pointRadius: 0 }] };
        dataBSR[2] = { labels: [0], datasets: [{ label: 'Channel_3', data: [], borderColor: '#32a836', backgroundColor: '#32a836', borderWidth: 2, pointRadius: 0 }] };
        dataBSR[3] = { labels: [0], datasets: [{ label: 'Channel_4', data: [], borderColor: '#b80d43', backgroundColor: '#b80d43', borderWidth: 2, pointRadius: 0 }] };

        var optionsBSR = {
            scales: {
                y: {
                    display: true,
                    title: { display: true, text: 'Analog', color: '#999', font: { family: 'Roboto', size: 20, lineHeight: 1.2 }, padding: { top: 20, left: 0, right: 0, bottom: 0 } },
                    suggestedMin: 0,
                    suggestedMax: 5000,
                },
                x: {
                    display: true,
                    title: { display: true, text: 'Time', color: '#999', font: { family: 'Roboto', size: 20, lineHeight: 1.2 }, padding: { top: 10, left: 0, right: 0, bottom: 0 } },
                    ticks: { maxTicksLimit: 10 },
                },
            },
            animation: { duration: 0 },
            elements: { line: { tension: 0.5 } },
            responsive: true,
        };

        Chart.defaults.font.size = 13;
        Chart.defaults.font.style = 'normal';
        Chart.defaults.backgroundColor = '#44d474';
        /**********************************************************************************************************************************/

        // Hard cap on in-memory points per channel used for the chart ONLY.
        // This is intentionally decoupled from recording, so a busy/slow chart
        // can never cause samples to be lost or block data intake.
        const CHART_MAX_POINTS = 250;
        // Chart is redrawn on its own slow timer, independent of packet arrival rate.
        const CHART_REDRAW_MS = 200;

        var chart = [];
        function create_chart() {
            if (chart.length) {
                for (var i = 0; i < chart.length; i++) {
                    $('#d' + i).toggleClass('d-none');
                    chart[i].destroy();
                    $('#c' + i).toggleClass('d-none');
                }
                chart.length = 0;
            }

            if ($('.select_list_gpio')[0]) $('.select_list_gpio').remove();
            if ($('.input_sampling_rate')[0]) $('.input_sampling_rate').remove();

            gpio_text = ['GPIO 32', 'GPIO 33', 'GPIO 34', 'GPIO 35', 'GPIO 36', 'GPIO 37', 'GPIO 38', 'GPIO 39'];
            gpio_value = ['4', '5', '6', '7', '0', '1', '2', '3'];

            var channelCount = parseInt($('#channel_count').val());

            if (!isNaN(channelCount) && channelCount > 0) {
                for (var i = 0; i < channelCount; i++) {
                    $('#d' + i).toggleClass('d-none');
                    $('#c' + i).toggleClass('d-none');

                    const ctx = $('#c' + i)[0].getContext('2d');
                    chart[i] = new Chart(ctx, { type: 'line', data: dataBSR[i], options: optionsBSR });

                    var subparent = document.createElement('p');
                    var select_list_gpio = document.createElement('select');
                    select_list_gpio.setAttribute('class', 'select_list_gpio m-1 w-auto form-select-md');
                    var input_sampling_rate = document.createElement('input');
                    input_sampling_rate.setAttribute('class', 'input_sampling_rate w-auto m-1 form-md');

                    for (var j = 0; j < gpio_text.length; j++) {
                        option = document.createElement('option');
                        option.value = gpio_value[j];
                        option.text = gpio_text[j];
                        select_list_gpio.appendChild(option);
                    }
                    subparent.appendChild(select_list_gpio);
                    subparent.appendChild(input_sampling_rate);
                    $('#d' + i).append(subparent);
                }
            } else {
                console.log('Something Went Wrong!');
            }

            $('.input_sampling_rate').attr('type', 'number');
            $(document).ready(function () {
                $('input').attr({ max: 5000, min: 1 });
            });
        }

        create_chart();

        var webSocket = null;
        var chartRedrawTimer = null;

        /*********************************** Streaming CSV writer *************************************/
        // Preferred path: File System Access API. Writes go straight to disk as
        // samples arrive, so memory never grows no matter how long you record.
        var fileHandle = null;
        var writableStream = null;
        var writeQueue = [];       // small pending-row buffer, flushed frequently
        var writeInFlight = false;
        var sampleCount = 0;

        // Fallback path (no File System Access API, e.g. Firefox): accumulate
        // rows in an array (NOT a string) and periodically download+clear
        // chunks, so memory still can't grow unbounded.
        var fallbackRows = [];
        var fallbackChunkIndex = 0;
        const FALLBACK_FLUSH_ROWS = 5000; // ~ a few minutes at 256Hz *1 channel

        async function choose_save_file() {
            if (!('showSaveFilePicker' in window)) {
                alert('Your browser does not support direct-to-disk saving. Falling back to periodic chunk downloads instead — use the "Download CSV (fallback)" button any time, and chunks will also auto-download during long recordings.');
                $('#save_target_label').text('none (fallback download mode)');
                return;
            }
            try {
                fileHandle = await window.showSaveFilePicker({
                    suggestedName: 'bsr_recording.csv',
                    types: [{ description: 'CSV file', accept: { 'text/csv': ['.csv'] } }],
                });
                writableStream = await fileHandle.createWritable();
                await writableStream.write('Channel, Time, Analog, Packet No.\n');
                $('#save_target_label').text(fileHandle.name);
            } catch (err) {
                // user cancelled the picker or permission denied
                console.log('Save file selection cancelled/failed:', err);
            }
        }

        function queue_row(channel_count, time, adcValue, packet_count) {
            sampleCount++;
            $('#sample_count_label').text(sampleCount);

            if (writableStream) {
                writeQueue.push(channel_count + ',' + time + ',' + adcValue + ',' + packet_count + '\n');
                flush_write_queue();
            } else {
                // fallback: array, not string concatenation
                fallbackRows.push(channel_count + ',' + time + ',' + adcValue + ',' + packet_count);
                if (fallbackRows.length >= FALLBACK_FLUSH_ROWS) {
                    save_csv_fallback();
                }
            }
            $('#buffer_count_label').text(writeQueue.length + fallbackRows.length);
        }

        // Batches queued rows into a single write() call so we don't hammer
        // the OS with a syscall per sample; still effectively immediate.
        async function flush_write_queue() {
            if (writeInFlight || writeQueue.length === 0) return;
            writeInFlight = true;
            const batch = writeQueue.splice(0, writeQueue.length).join('');
            try {
                await writableStream.write(batch);
            } catch (err) {
                console.error('Write to disk failed, re-queuing batch:', err);
                // Put the un-flushed batch back at the front of the queue so
                // no samples are lost; it will be retried on the next flush.
                writeQueue.unshift(batch);
            } finally {
                writeInFlight = false;
                if (writeQueue.length > 0) flush_write_queue();
            }
        }

        function save_csv_fallback() {
            if (fallbackRows.length === 0) return;
            var header = fallbackChunkIndex === 0 ? 'Channel, Time, Analog, Packet No.\n' : '';
            var csvFileData = header + fallbackRows.join('\n') + '\n';
            var hiddenElement = document.createElement('a');
            hiddenElement.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csvFileData);
            hiddenElement.target = '_blank';
            hiddenElement.download = 'bsr_recording_part' + fallbackChunkIndex + '.csv';
            hiddenElement.click();
            fallbackChunkIndex++;
            fallbackRows = [];
        }

        async function finalize_save() {
            await flush_write_queue();
            if (writableStream) {
                // wait for any in-flight write to settle, then close
                while (writeInFlight) await new Promise(r => setTimeout(r, 20));
                try { await writableStream.close(); } catch (e) { console.log(e); }
                writableStream = null;
            }
            if (fallbackRows.length > 0) save_csv_fallback();
        }
        /*************************************************************************************************/

        function stopOscilloscope() {
            if (webSocket != null) {
                webSocket.close();
                webSocket = null;
            }
            if (chartRedrawTimer) {
                clearInterval(chartRedrawTimer);
                chartRedrawTimer = null;
            }
            finalize_save();
        }

        function startOscilloscope() {
            var pin = [];
            var i = 0;
            $('.select_list_gpio').each(function () { pin[i] = $(this).val(); i++; });

            var rate = [];
            i = 0;
            $('.input_sampling_rate').each(function () { rate[i] = $(this).val(); i++; });

            webSocket = new WebSocket('ws://' + window.location.hostname + ':81/');
            webSocket.binaryType = 'arraybuffer';

            webSocket.addEventListener('open', (event) => {
                msg = $('#channel_count').val() + '9';
                webSocket.send(msg);
                for (var i = 0; i < parseInt($('#channel_count').val()); i++) {
                    msg = rate[i] + pin[i];
                    webSocket.send(msg);
                }
            });

            start_t = Date.now();

            // HOT PATH: keep this as cheap as possible. No chart update here,
            // no string concatenation here — just decode and queue the write.
            webSocket.onmessage = function (event) {
                if (!(event.data instanceof ArrayBuffer)) return;
                var ADC = new Uint16Array(event.data);

                var ch = ADC[ADC.length - 1];
                var packet_count = ADC[ADC.length - 2];
                var current_t = Date.now();
                var time = current_t - start_t;

                // small ring buffer for the chart, capped regardless of recording
                var ds = dataBSR[ch].datasets[0].data;
                var labels = dataBSR[ch].labels;

                for (var i = 0; i < ADC.length - 2; i++) {
                    var val = ADC[i];
                    queue_row(ch, time, val, packet_count);

                    ds.unshift(val);
                    if (ds.length > CHART_MAX_POINTS) ds.pop();
                }
                labels.unshift(time);
                if (labels.length > CHART_MAX_POINTS) labels.pop();
            };

            // Chart redraw runs independently and slowly — never blocks intake.
            chartRedrawTimer = setInterval(function () {
                var n = parseInt($('#channel_count').val());
                for (var i = 0; i < n; i++) {
                    if (chart[i]) chart[i].update();
                }
            }, CHART_REDRAW_MS);
        }

        window.addEventListener('beforeunload', function (e) {
            if (writeQueue.length > 0 || fallbackRows.length > 0) {
                finalize_save();
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>

</html>
